name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
#so what I understood is this workflow will trigger on any push or pull request to the main branch.
# It will run a job called "build-and-push" on an Ubuntu environment.
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # this step clones the code into the VM which is granted to me for free (since I have a public repo apparently)
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        # this step logs into DockerHub using credentials stored in GitHub Secrets.

      - name: Set Up Docker Build
        uses: docker/setup-buildx-action@v3

      # Agent System A (LangGraph Supervisor)
      - name: Build & Push Agent System A
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent_system_a/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agent-system-a:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agent-system-a:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Agent System B (Google ADK Valuation)
      - name: Build & Push Agent System B
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent_system_b/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agent-system-b:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agent-system-b:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # MCP Server (Financial Tools)
      - name: Build & Push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp_server/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend (React → Nginx)
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# docker-compose.hub.yml — Pull pre-built images from Docker Hub
# Usage:
#   1. Copy .env.example to .env and add your API keys
#   2. docker compose -f docker-compose.hub.yml up -d
#   3. Open http://localhost:5173
#
# You still need the data/ folder (CSV + PDFs). Get it from the GitHub repo:
#   git clone https://github.com/mohdfaour03/Real-Estate-Investment-Analyzer.git

services:

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  mcp-server:
    image: mofaour03/re-analyzer-mcp-server:latest
    ports:
      - "8002:8002"
    env_file: .env
    networks:
      - backend
    restart: unless-stopped

  agent-system-b:
    image: mofaour03/re-analyzer-agent-b:latest
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  agent-system-a:
    image: mofaour03/re-analyzer-agent-a:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - AGENT_B_URL=http://agent-system-b:8001
      - MCP_SERVER_URL=http://mcp-server:8002
      - CORS_ORIGINS=http://localhost:5173,http://frontend:80
    depends_on:
      qdrant:
        condition: service_healthy
      mcp-server:
        condition: service_started
      agent-system-b:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

  frontend:
    image: mofaour03/re-analyzer-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      agent-system-a:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  backend:
    driver: bridge

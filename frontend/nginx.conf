server {
    listen 80;
    server_name localhost;

    # Serve the React SPA
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # SPA fallback: any route that isn't a real file → index.html
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy ALL API calls to Agent System A
    location /chat {
        proxy_pass         http://agent-system-a:8000;
        proxy_http_version 1.1;
        # SSE support — disable buffering so tokens stream in real time
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
    }

    location /ingest {
        proxy_pass         http://agent-system-a:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    location /transcribe {
        proxy_pass         http://agent-system-a:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        client_max_body_size 25m;
    }

    location /health {
        proxy_pass http://agent-system-a:8000;
    }

    location /costs {
        proxy_pass http://agent-system-a:8000;
    }
}
